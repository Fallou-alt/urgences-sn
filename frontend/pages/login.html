<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Urgences SN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="login-page">
    <div style="width:100%;max-width:420px">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,#E53935,#B71C1C);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(229,57,53,.4);margin-bottom:16px">
                <i class="bi bi-fire text-white" style="font-size:1.5rem"></i>
            </div>
            <h1 style="font-family:'Poppins',sans-serif;font-weight:800;font-size:1.5rem;color:#fff;margin-bottom:4px">
                Urgences <span style="color:#E53935">SN</span>
            </h1>
            <p style="color:rgba(255,255,255,.45);font-size:.85rem">Espace professionnel sécurisé</p>
        </div>

        <!-- Carte de connexion -->
        <div class="login-card">
            <h2 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;color:#fff;text-align:center;margin-bottom:24px">
                Connexion
            </h2>

            <!-- Message d'erreur -->
            <div id="msg-erreur" class="rounded-3 p-3 mb-4 d-none"
                 style="background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.3);color:#FCA5A5;font-size:.85rem">
            </div>

            <!-- Identifiant -->
            <div class="mb-3">
                <label class="fw-medium mb-1 d-block" style="font-size:.82rem;color:rgba(255,255,255,.65)">Identifiant</label>
                <input type="text" id="identifiant"
                       class="form-control rounded-3"
                       style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:.9rem"
                       placeholder="Votre identifiant" autofocus>
            </div>

            <!-- Mot de passe -->
            <div class="mb-4">
                <label class="fw-medium mb-1 d-block" style="font-size:.82rem;color:rgba(255,255,255,.65)">Mot de passe</label>
                <div class="input-group">
                    <input type="password" id="mot_de_passe"
                           class="form-control rounded-start-3"
                           style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:.9rem"
                           placeholder="Votre mot de passe">
                    <button class="btn rounded-end-3" type="button" id="toggle-mdp"
                            style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5)">
                        <i class="bi bi-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Bouton connexion -->
            <button type="button" id="btn-login" onclick="seConnecter()"
                    class="btn w-100 py-2 fw-bold rounded-3"
                    style="background:#E53935;border-color:#E53935;color:#fff;font-family:'Poppins',sans-serif;font-size:.95rem;box-shadow:0 4px 16px rgba(229,57,53,.35)">
                Se connecter <i class="bi bi-arrow-right ms-1"></i>
            </button>

            <!-- Comptes de démo -->
            <div class="mt-4 pt-3" style="border-top:1px solid rgba(255,255,255,.08)">
                <p style="color:rgba(255,255,255,.35);font-size:.75rem;text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em">
                    Comptes de démonstration
                </p>
                <div class="d-flex flex-column gap-2">
                    <div class="d-flex justify-content-between align-items-center rounded-2 px-3 py-2"
                         style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);cursor:pointer"
                         onclick="remplir('admin','admin123')">
                        <span style="font-size:.8rem;font-weight:600;color:#E53935">Admin</span>
                        <span style="font-size:.78rem;color:rgba(255,255,255,.4);font-family:monospace">admin / admin123</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center rounded-2 px-3 py-2"
                         style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);cursor:pointer"
                         onclick="remplir('pompier1','pompier123')">
                        <span style="font-size:.8rem;font-weight:600;color:#F59E0B">Pompier</span>
                        <span style="font-size:.78rem;color:rgba(255,255,255,.4);font-family:monospace">pompier1 / pompier123</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center rounded-2 px-3 py-2"
                         style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);cursor:pointer"
                         onclick="remplir('samu1','samu123')">
                        <span style="font-size:.8rem;font-weight:600;color:#3B82F6">SAMU</span>
                        <span style="font-size:.78rem;color:rgba(255,255,255,.4);font-family:monospace">samu1 / samu123</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Retour accueil -->
        <div class="text-center mt-4">
            <a href="index.html" style="color:rgba(255,255,255,.4);font-size:.82rem;text-decoration:none">
                <i class="bi bi-arrow-left me-1"></i> Retourner à l'accueil citoyen
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
    // Remplir automatiquement les champs avec un compte de démo
    function remplir(id, mdp) {
        document.getElementById('identifiant').value   = id;
        document.getElementById('mot_de_passe').value  = mdp;
    }

    // Connexion via l'API Laravel
    async function seConnecter() {
        const msgErreur = document.getElementById('msg-erreur');
        msgErreur.classList.add('d-none');

        const identifiant  = document.getElementById('identifiant').value.trim();
        const mot_de_passe = document.getElementById('mot_de_passe').value;

        if (!identifiant || !mot_de_passe) {
            msgErreur.textContent = '⚠️ Veuillez remplir tous les champs.';
            msgErreur.classList.remove('d-none');
            return;
        }

        const btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Connexion...';

        try {
            const data = await apiCall('/login', 'POST', { identifiant, mot_de_passe });

            if (data.token) {
                // Sauvegarder le token et les infos utilisateur
                localStorage.setItem('token', data.token);
                localStorage.setItem('user',  JSON.stringify(data.user));

                // Rediriger selon le rôle
                const role = data.user.role;
                if      (role === 'admin')   window.location.href = 'dashboard-admin.html';
                else if (role === 'pompier') window.location.href = 'dashboard-pompiers.html';
                else if (role === 'samu')    window.location.href = 'dashboard-samu.html';
            } else {
                throw new Error(data.message || 'Identifiant ou mot de passe incorrect.');
            }
        } catch (e) {
            msgErreur.textContent = '❌ ' + e.message;
            msgErreur.classList.remove('d-none');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Se connecter <i class="bi bi-arrow-right ms-1"></i>';
        }
    }

    // Afficher / masquer le mot de passe
    document.getElementById('toggle-mdp').addEventListener('click', function() {
        const input = document.getElementById('mot_de_passe');
        const icon  = document.getElementById('eye-icon');
        input.type  = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });

    // Connexion avec Entrée
    document.getElementById('mot_de_passe').addEventListener('keydown', e => {
        if (e.key === 'Enter') seConnecter();
    });

    // Si déjà connecté, rediriger directement
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (user && getToken()) {
        if      (user.role === 'admin')   window.location.href = 'dashboard-admin.html';
        else if (user.role === 'pompier') window.location.href = 'dashboard-pompiers.html';
        else if (user.role === 'samu')    window.location.href = 'dashboard-samu.html';
    }
</script>
</body>
</html>
